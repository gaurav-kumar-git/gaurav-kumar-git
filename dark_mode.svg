<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" rx="10" fill="#0d1117"/>
  <style>
    .base { font-family: 'Courier New', monospace; font-size: 13px; }
    .label { fill: #ffa657; }
    .dots { fill: #30363d; }
    .value { fill: #58a6ff; }
    .header { fill: #e6edf3; font-weight: bold; }
    .ascii { fill: #8b949e; font-size: 8px; line-height: 1; }
  </style>
  
  <!-- The script will inject the face here -->
  <text x="20" y="45" id="ascii_art" class="ascii" xml:space="preserve">
    Processing image...
  </text>

  <g class="base" transform="translate(340, 40)">
    <text class="header">gaurav@kumar —————————————————————————————————————</text>
    <text y="25" class="label">OS:</text><text x="30" y="25" id="os_dots" class="dots"> ............................ </text><text x="210" y="25" class="value">Ubuntu, MacOS, Windows</text>
    <text y="45" class="label">Uptime:</text><text x="60" y="45" id="uptime_data_dots" class="dots"> ................. </text><text x="180" y="45" id="uptime_data" class="value">Calculating...</text>
    <text y="65" class="label">Host:</text><text x="45" y="65" id="host_dots" class="dots"> ............................ </text><text x="210" y="65" class="value">IIT Bombay (M.Tech)</text>
    <text y="85" class="label">Kernel:</text><text x="60" y="85" id="kernel_dots" class="dots"> ........... </text><text x="150" y="85" class="value">ML &amp; LLM Systems</text>
    
    <text y="120" class="label">Languages.Prog:</text><text x="120" y="120" id="lang_dots" class="dots"> ....... </text><text x="180" y="120" class="value">Python, C++, SQL</text>
    <text y="140" class="label">Languages.Real:</text><text x="120" y="140" id="real_dots" class="dots"> ....... </text><text x="180" y="140" class="value">English, Hindi</text>
    
    <text y="175" class="header">Contact —————————————————————————————————————————</text>
    <text y="200" class="label">Email:</text><text x="50" y="200" id="email_dots" class="dots"> ......................... </text><text x="200" y="200" class="value">gauravkumar81437@gmail.com</text>
    <text y="220" class="label">LinkedIn:</text><text x="80" y="220" id="li_dots" class="dots"> ...................... </text><text x="240" y="220" class="value">connectgaurav</text>
    
    <text y="255" class="header">GitHub Stats ————————————————————————————————————</text>
    <text y="280" class="label">Repos:</text><text x="50" y="280" id="repo_data_dots" class="dots"> ....................... </text><text x="250" y="280" id="repo_data" class="value">0</text>
    <text y="300" class="label">Stars:</text><text x="50" y="300" id="star_data_dots" class="dots"> ....................... </text><text x="250" y="300" id="star_data" class="value">0</text>
    <text y="320" class="label">Commits:</text><text x="70" y="320" id="commit_data_dots" class="dots"> ..................... </text><text x="250" y="320" id="commit_data" class="value">0</text>
    <text y="340" class="label">Followers:</text><text x="90" y="340" id="follower_data_dots" class="dots"> ................. </text><text x="250" y="340" id="follower_data" class="value">0</text>
  </g>
